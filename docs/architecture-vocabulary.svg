<svg width="100%" viewBox="0 0 680 812" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Словарь дизайна модулей: глубина, шов, адаптер, рычаг, локальность, владение</title>
  <desc>Шпаргалка из шести карточек, объясняющих ключевые термины архитектуры кода.</desc>
  <style>
    .surface { fill: #ffffff; stroke: #e5e7eb; }
    .card-title { fill: #111827; font-weight: 700; }
    .kicker { fill: #0d9488; }
    .muted { fill: #6b7280; }
    .sec { fill: #374151; }
    .strong { fill: #ffffff; stroke: #9ca3af; }
    .teal { fill: #ccfbf1; stroke: #14b8a6; }
    .teal-t { fill: #0f766e; }
    .rose { fill: #ffe4e6; stroke: #f43f5e; }
    .slate { fill: #e2e8f0; stroke: #94a3b8; }
    .slate-t { fill: #334155; }
    @media (prefers-color-scheme: dark) {
      .surface { fill: #1e293b; stroke: #334155; }
      .card-title { fill: #f1f5f9; }
      .kicker { fill: #2dd4bf; }
      .muted { fill: #94a3b8; }
      .sec { fill: #cbd5e1; }
      .strong { fill: #334155; stroke: #64748b; }
      .teal { fill: #134e4a; stroke: #2dd4bf; }
      .teal-t { fill: #99f6e4; }
      .rose { fill: #4c1d24; stroke: #fb7185; }
      .slate { fill: #334155; stroke: #64748b; }
      .slate-t { fill: #e2e8f0; }
    }
  </style>

  <text x="24" y="30" font-size="20" font-weight="700" class="card-title">Словарь дизайна модулей</text>
  <rect x="470" y="16" width="14" height="14" rx="3" class="teal"/>
  <text x="490" y="27" font-size="11" class="muted">глубоко / хорошо</text>
  <rect x="586" y="16" width="14" height="14" rx="3" class="rose"/>
  <text x="606" y="27" font-size="11" class="muted">мелко / протечка</text>

  <!-- CARD 1 -->
  <rect x="24" y="56" width="308" height="236" rx="14" class="surface"/>
  <text x="42" y="86" font-size="15" class="card-title">1 · Глубина</text>
  <text x="42" y="104" font-size="11" class="kicker">интерфейс vs реализация</text>
  <rect x="72" y="124" width="52" height="12" rx="3" class="strong"/>
  <rect x="72" y="136" width="52" height="86" rx="4" class="teal"/>
  <text x="98" y="240" font-size="11" font-weight="600" text-anchor="middle" class="sec">глубокий</text>
  <rect x="188" y="124" width="104" height="12" rx="3" class="strong"/>
  <rect x="188" y="136" width="104" height="24" rx="4" class="rose"/>
  <text x="240" y="240" font-size="11" font-weight="600" text-anchor="middle" class="sec">мелкий</text>
  <text x="42" y="276" font-size="11.5" class="muted">узкий вызов прячет много работы</text>

  <!-- CARD 2 -->
  <rect x="348" y="56" width="308" height="236" rx="14" class="surface"/>
  <text x="366" y="86" font-size="15" class="card-title">2 · Шов + адаптеры</text>
  <text x="366" y="104" font-size="11" class="kicker">seam · adapter</text>
  <rect x="366" y="126" width="120" height="40" rx="6" class="slate"/>
  <text x="426" y="150" font-size="12" text-anchor="middle" dominant-baseline="central" class="slate-t">AIService</text>
  <line x1="486" y1="146" x2="536" y2="146" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="511" y="138" font-size="9.5" text-anchor="middle" class="muted">шов</text>
  <rect x="536" y="118" width="102" height="26" rx="6" class="teal"/>
  <text x="587" y="132" font-size="11" text-anchor="middle" dominant-baseline="central" class="teal-t">HTTP (прод)</text>
  <rect x="536" y="150" width="102" height="26" rx="6" class="teal"/>
  <text x="587" y="164" font-size="11" text-anchor="middle" dominant-baseline="central" class="teal-t">Fake (тест)</text>
  <text x="366" y="222" font-size="11.5" class="muted">точка подмены реализации</text>
  <text x="366" y="264" font-size="12.5" font-weight="700" class="card-title">2 адаптера = настоящий шов</text>
  <text x="366" y="282" font-size="11" class="muted">1 адаптер = гипотетический</text>

  <!-- CARD 3 -->
  <rect x="24" y="308" width="308" height="236" rx="14" class="surface"/>
  <text x="42" y="338" font-size="15" class="card-title">3 · Рычаг</text>
  <text x="42" y="356" font-size="11" class="kicker">leverage</text>
  <rect x="48" y="372" width="70" height="20" rx="4" class="strong"/>
  <rect x="48" y="398" width="70" height="20" rx="4" class="strong"/>
  <rect x="48" y="424" width="70" height="20" rx="4" class="strong"/>
  <rect x="48" y="450" width="70" height="20" rx="4" class="strong"/>
  <line x1="122" y1="382" x2="196" y2="420" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="122" y1="408" x2="196" y2="422" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="122" y1="434" x2="196" y2="424" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="122" y1="460" x2="196" y2="426" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="198" y="400" width="112" height="44" rx="6" class="teal"/>
  <text x="254" y="422" font-size="12" text-anchor="middle" dominant-baseline="central" class="teal-t">transactionsUrl</text>
  <text x="42" y="502" font-size="11.5" class="muted">один интерфейс — N точек вызова</text>
  <text x="42" y="524" font-size="11.5" class="muted">правка внутри → польза везде</text>

  <!-- CARD 4 -->
  <rect x="348" y="308" width="308" height="236" rx="14" class="surface"/>
  <text x="366" y="338" font-size="15" class="card-title">4 · Локальность</text>
  <text x="366" y="356" font-size="11" class="kicker">locality</text>
  <text x="418" y="382" font-size="10.5" text-anchor="middle" class="muted">было</text>
  <rect x="372" y="392" width="40" height="18" rx="4" class="rose"/>
  <rect x="424" y="410" width="40" height="18" rx="4" class="rose"/>
  <rect x="382" y="432" width="40" height="18" rx="4" class="rose"/>
  <text x="418" y="470" font-size="10.5" text-anchor="middle" class="muted">размазано</text>
  <text x="592" y="382" font-size="10.5" text-anchor="middle" class="muted">стало</text>
  <rect x="536" y="398" width="112" height="52" rx="6" class="teal"/>
  <text x="592" y="424" font-size="12" text-anchor="middle" dominant-baseline="central" class="teal-t">один дом</text>
  <text x="592" y="470" font-size="10.5" text-anchor="middle" class="muted">рядом</text>
  <text x="366" y="502" font-size="11.5" class="muted">связанное знание — в одном месте</text>
  <text x="366" y="524" font-size="11.5" class="muted">там же концентрируются баги</text>

  <!-- CARD 5 -->
  <rect x="24" y="560" width="308" height="236" rx="14" class="surface"/>
  <text x="42" y="590" font-size="15" class="card-title">5 · Владение</text>
  <text x="42" y="608" font-size="11" class="kicker">ownership</text>
  <rect x="48" y="628" width="86" height="22" rx="4" class="strong"/>
  <text x="91" y="643" font-size="10" text-anchor="middle" class="sec">эндпоинт</text>
  <rect x="48" y="662" width="86" height="22" rx="4" class="strong"/>
  <text x="91" y="677" font-size="10" text-anchor="middle" class="sec">импорт</text>
  <line x1="136" y1="639" x2="196" y2="655" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="136" y1="673" x2="196" y2="665" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="198" y="632" width="112" height="52" rx="6" class="teal"/>
  <text x="254" y="652" font-size="12" text-anchor="middle" dominant-baseline="central" class="teal-t">сервис</text>
  <text x="254" y="670" font-size="9.5" text-anchor="middle" dominant-baseline="central" class="teal-t">владеет + инвалидирует</text>
  <text x="42" y="726" font-size="11.5" class="muted">одна ответственность — один дом</text>
  <text x="42" y="748" font-size="11.5" class="muted">не течёт через шов наружу</text>
  <text x="42" y="770" font-size="11" class="muted">забыл владельца → потерял правило</text>

  <!-- CARD 6 -->
  <rect x="348" y="560" width="308" height="236" rx="14" class="surface"/>
  <text x="366" y="590" font-size="15" class="card-title">6 · Тест удалением</text>
  <text x="366" y="608" font-size="11" class="kicker">deletion test</text>
  <text x="366" y="636" font-size="12" class="sec">удали модуль мысленно →</text>
  <rect x="366" y="652" width="128" height="40" rx="6" class="teal"/>
  <text x="430" y="666" font-size="11" text-anchor="middle" dominant-baseline="central" class="teal-t">концентрирует</text>
  <text x="430" y="682" font-size="9.5" text-anchor="middle" dominant-baseline="central" class="teal-t">= был глубоким ✓</text>
  <rect x="510" y="652" width="128" height="40" rx="6" class="rose"/>
  <text x="574" y="666" font-size="11" text-anchor="middle" dominant-baseline="central" class="sec">перекладывает</text>
  <text x="574" y="682" font-size="9.5" text-anchor="middle" dominant-baseline="central" class="sec">= мелкий, не нужен ✗</text>
  <text x="366" y="726" font-size="11.5" class="muted">проверка «это углубление</text>
  <text x="366" y="744" font-size="11.5" class="muted">или просто переименование?»</text>
</svg>
