services:
  moneymanager:
    image: ghcr.io/unclehobbot/moneymanager:latest
    container_name: moneymanager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - mm-data:/app/data
      - mm-backups:/app/backups
      - mm-csv-archive:/app/csv-archive
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/MoneyManager.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mm-data:
    driver: local
  mm-backups:
    driver: local
  mm-csv-archive:
    driver: local
